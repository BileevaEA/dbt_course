sources:
  - name: demo_src
    description: Данные из БД авиаперелетев
    database: dwh_flight
    schema: demo_src
    tables:
      - name: aircrafts
        description: '{{ doc("aircrafts_description") }}'
        columns:
          - name: aircraft_code
            description: >
              Код модели самолета
              Состоит из 3 латинских букв
            tests: 
              - not_null
              - unique
          - name: model
            description: Название модели самолета
          - name: range
            description: "_Неизвестное поле_"
      - name: airports
        description: Аэропорты
        columns:
          - name: airport_code
          - name: airport_name
          - name: city
          - name: coordinates
          - name: timezone
      - name: seats
        description: Места в самолетах
        columns:
          - name: aircraft_code
          - name: seat_no
          - name: fare_conditions
      - name: bookings          
      